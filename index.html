*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#F0F4FF;color:#0f172a;min-height:100vh;height:auto;
  overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;font-size:16px}

.hdr{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);padding:14px 16px 12px;
  position:sticky;top:0;z-index:200}
.hdr-title{font-size:17px;font-weight:900;color:#fff}
.hdr-sub{font-size:11px;color:#93c5fd;margin-top:3px}

.stats{display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border-bottom:2px solid #e2e8f0}
.stat{text-align:center;padding:10px 4px;border-top:3px solid}
.stat:nth-child(1){border-color:#3B82F6;background:#EFF6FF}
.stat:nth-child(2){border-color:#10B981;background:#ECFDF5}
.stat:nth-child(3){border-color:#F59E0B;background:#FFFBEB}
.stat:nth-child(4){border-color:#EC4899;background:#FDF2F8}
.stat-val{font-size:20px;font-weight:900;color:#0f172a;line-height:1}
.stat-lbl{font-size:10px;color:#475569;font-weight:600;margin-top:2px}

.main-tabs{display:flex;background:#fff;border-bottom:3px solid #e2e8f0;position:sticky;top:68px;z-index:199}
.main-tab{flex:1;padding:13px 0;font-size:15px;font-weight:700;border:none;
  background:none;cursor:pointer;color:#64748b;font-family:inherit;
  border-bottom:4px solid transparent;margin-bottom:-3px}
.main-tab.active{color:#1e40af;border-bottom-color:#1e40af;background:#f0f6ff}

.group-bar{display:flex;overflow-x:auto;gap:8px;padding:10px 14px;
  background:#fff;border-bottom:1px solid #e2e8f0;
  position:sticky;top:119px;z-index:198;scrollbar-width:none}
.group-bar::-webkit-scrollbar{display:none}
.gbtn{padding:7px 16px;border-radius:99px;font-size:14px;font-weight:800;
  border:2.5px solid;cursor:pointer;background:#fff;font-family:inherit;white-space:nowrap;flex-shrink:0}
.gbtn.active{color:#fff}

.date-hdr{padding:12px 16px 8px;font-size:12px;font-weight:800;color:#64748b;
  text-transform:uppercase;letter-spacing:.08em;background:#F0F4FF;
  border-bottom:1px solid #dde4f0}

.match-card{background:#fff;margin:8px 12px;border-radius:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
.card-top{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 8px;border-bottom:1px solid #f1f5f9}
.group-pill{display:inline-flex;align-items:center;padding:5px 12px;
  border-radius:99px;font-size:13px;font-weight:900;border:2.5px solid}
.match-time{font-size:24px;font-weight:900;color:#1e40af;line-height:1}
.match-date{font-size:11px;color:#94a3b8;text-align:right;margin-top:2px}

.teams{padding:12px 14px}
.team-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.team-row+.team-row{border-top:1px solid #f1f5f9;margin-top:2px;padding-top:8px}
.flag{width:36px;height:24px;object-fit:cover;border-radius:4px;
  border:1px solid rgba(0,0,0,.1);flex-shrink:0}
.team-zh{font-size:19px;font-weight:800;color:#0f172a}
.team-en{font-size:11px;color:#94a3b8;margin-left:2px}
.vs-line{text-align:center;font-size:11px;color:#cbd5e1;
  font-weight:700;letter-spacing:.1em;padding:1px 0}

.venue-row{display:flex;align-items:center;gap:5px;padding:8px 14px;
  background:#f8faff;border-top:1px solid #f1f5f9;font-size:12px;color:#475569;font-weight:500}

.guide-btn{width:100%;text-align:left;padding:12px 14px;background:#EFF6FF;
  border:none;border-top:1px solid #BFDBFE;cursor:pointer;
  font-size:14px;color:#1e40af;font-weight:700;font-family:inherit;
  display:flex;align-items:center;justify-content:space-between}
.guide-body{display:none;padding:14px;background:#f0f6ff;border-top:1px solid #dbeafe}
.guide-body.open{display:block}
.guide-title{font-size:14px;font-weight:800;color:#1e3a8a;margin-bottom:8px;line-height:1.5}
.guide-text{font-size:13px;color:#334155;line-height:1.8}
.guide-key{margin-top:10px;padding:10px 12px;background:#fff;border-radius:10px;border-left:4px solid #f59e0b}
.guide-key-lbl{font-size:10px;font-weight:800;text-transform:uppercase;color:#b45309;letter-spacing:.06em;margin-bottom:4px}
.guide-key-text{font-size:13px;color:#1e293b;line-height:1.7}

.search-toggle{

.search-toggle-arrow{font-size:11px;color:#94a3b8;transition:transform .2s}

.search-panel{
  display:none;padding:10px 14px;background:#fff;
  border-bottom:2px solid #e2e8f0;gap:8px;flex-direction:column;

.search-panel.open{display:flex}
.search-row{display:flex;gap:8px;align-items:center}
.search-input{
  flex:1;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:99px;
  font-size:14px;font-family:inherit;outline:none;background:#f8faff;
  color:#0f172a;

.search-select{

  font-size:14px;font-family:inherit;outline:none;background:#f8faff;

.search-clear{

  background:#fff;font-size:13px;font-weight:700;color:#64748b;

.match-count{font-size:11px;color:#94a3b8;font-weight:600;text-align:right}

.ko-tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid #e2e8f0;

.ko-tab{padding:12px 18px;font-size:14px;font-weight:700;border:none;background:none;

.ko-list{padding:10px 12px;display:flex;flex-direction:column;gap:10px}

.ko-card.third-card{border:2px solid #10B981}

function getGuide(t1,t2){return GUIDES[t1+'|'+t2]||GUIDES[t2+'|'+t1]||null;}
function flagUrl(t){return 'https://flagcdn.com/48x36/'+(FLAG_CODE[t]||t.toLowerCase().replace(/ /g,'-').replace(/[^a-z-]/g,''))+'.png';}

function fmtDate(iso){
  var d=new Date(iso+'Z'),tw=new Date(d.getTime()+8*3600000);
  var days=['週日','週一','週二','週三','週四','週五','週六'];
  return (tw.getUTCMonth()+1)+'/'+(tw.getUTCDate())+' '+days[tw.getUTCDay()];
}
function fmtTime(iso){
  var d=new Date(iso+'Z'),tw=new Date(d.getTime()+8*3600000);
  return ('0'+tw.getUTCHours()).slice(-2)+':'+('0'+tw.getUTCMinutes()).slice(-2);
}

var currentGroup='ALL';

function renderGroupBtns(){
  var bar=document.getElementById('groupBtns');
  var groups=['ALL','A','B','C','D','E','F','G','H','I','J','K','L'];
  bar.innerHTML='';
  groups.forEach(function(g){
    var b=document.createElement('button');
    b.className='gbtn'+(g===currentGroup?' active':'');
    b.textContent=g==='ALL'?'全部':g;
    var col=g==='ALL'?'#334155':(GT[g]?GT[g].bdr:'#334155');
    b.style.borderColor=col;
    b.style.color=g===currentGroup?'#fff':col;
    if(g===currentGroup) b.style.background=col;
    b.onclick=function(){currentGroup=g;renderGroupBtns();renderMatches();};
    bar.appendChild(b);
  });
}

function populateDateFilter(){
  var sel=document.getElementById('dateFilter');
  if(!sel||sel.options.length>1) return;
  var dates={};
  matches.forEach(function(m){dates[fmtDate(m.cest)]=1;});
  Object.keys(dates).forEach(function(d){
    var opt=document.createElement('option');opt.value=d;opt.textContent=d;sel.appendChild(opt);
  });
}

function toggleSearch(){
  var panel=document.getElementById('searchPanel');
  var arrow=document.getElementById('searchArrow');
  var open=panel.classList.contains('open');
  panel.classList.toggle('open',!open);
  arrow.classList.toggle('open',!open);
  if(!open) populateDateFilter();
}

function clearSearch(){
  var ts=document.getElementById('teamSearch');
  var df=document.getElementById('dateFilter');
  if(ts) ts.value='';
  if(df) df.value='';
  renderMatches();
}

function renderMatches(){
  var list=document.getElementById('matchList');
  var searchVal=(document.getElementById('teamSearch')||{}).value||'';
  var dateVal=(document.getElementById('dateFilter')||{}).value||'';
  searchVal=searchVal.toLowerCase().trim();

  var filtered=matches.filter(function(m){
    if(currentGroup!=='ALL' && m.g!==currentGroup) return false;
    if(dateVal && fmtDate(m.cest)!==dateVal) return false;
    if(searchVal){
      var zh1=(TEAM_ZH[m.t1]||'').toLowerCase();
      var zh2=(TEAM_ZH[m.t2]||'').toLowerCase();
      var en1=m.t1.toLowerCase(), en2=m.t2.toLowerCase();
      if(zh1.indexOf(searchVal)<0 && zh2.indexOf(searchVal)<0 &&
         en1.indexOf(searchVal)<0 && en2.indexOf(searchVal)<0) return false;
    }
    return true;
  });

  var cnt=document.getElementById('matchCount');
  if(cnt) cnt.textContent=filtered.length+'場賽事';

  var byDate={};
  filtered.forEach(function(m){
    var d=fmtDate(m.cest);
    if(!byDate[d]) byDate[d]=[];
    byDate[d].push(m);
  });
  var html='';
  Object.keys(byDate).forEach(function(date){
    html+='<div class="date-hdr">📅 '+date+'</div>';
    byDate[date].forEach(function(m,i){
      var t=GT[m.g]||{bg:'#f1f5f9',bdr:'#64748b'};
      var zh1=TEAM_ZH[m.t1]||m.t1, zh2=TEAM_ZH[m.t2]||m.t2;
      var guide=getGuide(m.t1,m.t2);
      var venue=VENUE_SHORT[m.venue]||m.venue;
      var gid='g'+i+m.cest.replace(/[^0-9]/g,'');
      html+='<div class="match-card">'
        +'<div class="card-top">'
        +'<div class="group-pill" style="background:'+t.bg+';border-color:'+t.bdr+';color:'+t.bdr+'">'+m.g+'</div>'
        +'<div style="text-align:right"><div class="match-time">'+fmtTime(m.cest)+'</div>'
        +'<div class="match-date">'+fmtDate(m.cest)+'</div></div>'
        +'</div>'
        +'<div class="teams">'
        +'<div class="team-row"><img class="flag" src="'+flagUrl(m.t1)+'" alt="">'
        +'<span class="team-zh">'+zh1+'</span><span class="team-en">'+m.t1+'</span></div>'
        +'<div class="vs-line">— VS —</div>'
        +'<div class="team-row"><img class="flag" src="'+flagUrl(m.t2)+'" alt="">'
        +'<span class="team-zh">'+zh2+'</span><span class="team-en">'+m.t2+'</span></div>'
        +'</div>'
        +'<div class="venue-row">📍 '+venue+'</div>';
      if(guide){
        html+='<button class="guide-btn" onclick="toggleGuide(\''+gid+'\')">'
          +'🔥 觀戰重點 <span id="arr-'+gid+'">▼</span></button>'
          +'<div class="guide-body" id="'+gid+'">'
          +'<div class="guide-title">'+guide.title+'</div>'
          +'<div class="guide-text">'+guide.body+'</div>'
          +'<div class="guide-key"><div class="guide-key-lbl">⭐ 關鍵球員</div>'
          +'<div class="guide-key-text">'+guide.key+'</div></div>'
          +'</div>';
      }
      html+='</div>';
    });
  });
  if(!html) html='<div style="text-align:center;padding:50px;color:#94a3b8">找不到賽事</div>';
  list.innerHTML=html;
}

function toggleGuide(id){
  var el=document.getElementById(id),arr=document.getElementById('arr-'+id);
  var open=el.classList.contains('open');
  el.classList.toggle('open',!open);
  arr.textContent=open?'▼':'▲';
}

function switchTab(tab){
  var isGroup=tab==='group';
  document.getElementById('panelGroup').style.display=isGroup?'block':'none';
  document.getElementById('panelKO').style.display=isGroup?'none':'block';
  document.getElementById('tabGroup').classList.toggle('active',isGroup);
  document.getElementById('tabKO').classList.toggle('active',!isGroup);
  if(!isGroup && !document.getElementById('koTabs').dataset.built) buildKOTabs();
}

var KO_LABELS=['32強','16強','準決賽','四強','季軍賽','決賽 🏆'];

function buildKOTabs(){
  var tabs=document.getElementById('koTabs');
  tabs.dataset.built='1';
  KO_ROUNDS.forEach(function(r,i){
    var btn=document.createElement('button');
    btn.className='ko-tab'+(i===0?' active':'');
    btn.textContent=KO_LABELS[i];
    btn.onclick=function(){
      tabs.querySelectorAll('.ko-tab').forEach(function(b,j){b.classList.toggle('active',j===i);});
      renderKORound(i);
    };
    tabs.appendChild(btn);
  });
  renderKORound(0);
}

function renderKORound(idx){
  var r=KO_ROUNDS[idx];
  var list=document.getElementById('koList');
  var html='<div class="ko-note">⚠️ 對手依小組賽結果確認後更新。所有時間為台灣時間（UTC+8）。</div>';
  r.matches.forEach(function(m){
    var cls=m.isFinal?'ko-card final-card':m.isThird?'ko-card third-card':'ko-card';
    var mkTeam=function(t){
      return t.tbd
        ?'<div class="ko-tbd">'+t.name+'</div>'
        :'<img class="ko-flag" src="https://flagcdn.com/48x36/'+t.code+'.png" alt="">'+t.name+'</div>';
    };
    html+='<div class="'+cls+'">'
      +'<div class="ko-hdr"><span class="ko-mid">'+(m.id||'')+'</span>'
      +'<div style="text-align:right"><div class="ko-time">'+m.time+'</div>'
      +'<div class="ko-date">'+m.date+'</div></div></div>'
      +'<div class="ko-teams">'
      +'<div class="ko-team-row">'+mkTeam(m.home)+'</div>'
      +'<div class="vs-line" style="padding:4px 0;font-size:11px;color:#cbd5e1;font-weight:700;letter-spacing:.1em">— VS —</div>'
      +'<div class="ko-team-row">'+mkTeam(m.away)+'</div>'
      +'</div>'
      +'<div class="ko-venue">📍 '+m.venue+'</div>'
      +'</div>';
  });
  list.innerHTML=html;
}
